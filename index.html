html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}

body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--t1);line-height:1.5;min-height:100dvh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border-d);border-radius:4px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounceIn{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.page-enter{animation:fadeIn .25s ease-out}
[data-theme="dark"]{--primary:#4CAF50;--primary-d:#388E3C;--primary-l:#1B2E1B;--gold:#FFB74D;--gold-l:#2D1E00;--t1:#F9FAFB;--t2:#E5E7EB;--t3:#9CA3AF;--t4:#6B7280;--border:#374151;--border-d:#4B5563;--bg:#111827;--surface:#1F2937}
[data-theme="dark"] body{background:#111827;color:#F9FAFB}
[data-theme="dark"] .top-nav,[data-theme="dark"] .bottom-nav{background:rgba(31,41,55,.97);border-color:#374151}
[data-theme="dark"] .card{background:#1F2937;border-color:#374151}
[data-theme="dark"] input.fi,[data-theme="dark"] select.fi,[data-theme="dark"] textarea.fi{background:#111827;color:#F9FAFB;border-color:#374151}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--radius-m);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--t1);transition:all .2s ease;white-space:nowrap;user-select:none;-webkit-tap-highlight-color:transparent}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:var(--shadow-s)}
.btn:active:not(:disabled){transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover:not(:disabled){background:var(--primary-d);border-color:var(--primary-d);box-shadow:0 4px 16px rgba(46,125,50,.3)}
.btn-ghost{border-color:transparent;background:transparent}
.btn-lg{padding:13px 28px;font-size:15px;border-radius:var(--radius-l)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:var(--radius-s)}
.btn-full{width:100%}
.card{background:var(--surface);border-radius:var(--radius-l);border:1px solid var(--border);transition:all .2s ease}
.card-hover:hover{transform:translateY(-2px);box-shadow:var(--shadow-m);cursor:pointer}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-m);font-size:14px;font-family:inherit;background:var(--surface);color:var(--t1);transition:border-color .15s,box-shadow .15s}
.fi:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(46,125,50,.12)}
.fi::placeholder{color:var(--t4)}
select.fi{cursor:pointer}
textarea.fi{resize:vertical;min-height:70px}
.err-box{background:var(--danger-l);border:1px solid #FECACA;border-radius:var(--radius-m);padding:10px 14px;font-size:13px;color:var(--danger);margin-bottom:12px}

.nav-brand{font-size:16px;font-weight:800;color:var(--primary);display:flex;align-items:center;gap:6px}
.nav-title{font-size:15px;font-weight:700;color:var(--t1)}

.bn-tab{flex:1;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 0;color:var(--t4);transition:all .2s;-webkit-tap-highlight-color:transparent}
.bn-tab.active{color:var(--primary)}
.bn-tab:active{transform:scale(.9)}
.bn-icon{font-size:22px;transition:transform .2s}
.bn-tab.active .bn-icon{transform:scale(1.1)}
.bn-lbl{font-size:10px;font-weight:600}
.fab{position:fixed;bottom:80px;right:18px;width:56px;height:56px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(46,125,50,.45);z-index:150;display:flex;align-items:center;justify-content:center;transition:transform .25s,box-shadow .25s;-webkit-tap-highlight-color:transparent}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(46,125,50,.55)}
.fab:active{transform:scale(.93)}
.fab-menu{position:fixed;bottom:148px;right:18px;z-index:149;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.fab-item{display:flex;align-items:center;gap:10px}
.fab-item-label{background:var(--t1);color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;box-shadow:var(--shadow-m)}
.fab-item-btn{width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;font-size:20px;box-shadow:var(--shadow-m);display:flex;align-items:center;justify-content:center}
.loading{display:flex;align-items:center;justify-content:center;padding:60px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}

@media(min-width:1024px){.top-nav{padding:14px 40px}}
@media print{.top-nav,.bottom-nav,.fab,.fab-menu{display:none!important}}

<script>
window.onerror = function(msg,src,line){
  var r=document.getElementById('root');
  if(r) r.innerHTML='<div style="padding:30px;font-family:system-ui;min-height:100vh;background:#FEF2F2">'
    +'<div style="font-size:48px;margin-bottom:12px">⚠️</div>'
    +'<h2 style="color:#DC2626;margin-bottom:12px">Erreur DMC</h2>'
    +'<p style="font-size:14px;color:#374151;background:#fff;padding:12px;border-radius:8px;margin-bottom:12px">'+(msg||'Erreur')+'</p>'
    +'<p style="font-size:12px;color:#6B7280">Ligne '+(line||'?')+'</p>'
    +'<button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:#2E7D32;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700">Recharger</button>'
    +'</div>';
};
function dmc_status(m){var e=document.getElementById('dmc-status');if(e)e.textContent=m}
dmc_status('Chargement React...');
</script>

  const pp = pat.split('/'),

    if (pp[i].startsWith(':')) p[pp[i].slice(1)] = decodeURIComponent(sp[i] || '');else if (pp[i] !== sp[i]) return null;

const PwaCtx = createContext({

  installed: false
});
function PwaProvider({
  children
}) {
  const [prompt, setPrompt] = useState(null);
  const [installed, setInstalled] = useState(() => {
    try {
      return window.matchMedia('(display-mode:standalone)').matches;
    } catch {
      return false;
    }
  });
  useEffect(() => {
    const h = e => {
      e.preventDefault();
      setPrompt(e);
    };
    window.addEventListener('beforeinstallprompt', h);
    window.addEventListener('appinstalled', () => {
      setInstalled(true);
      setPrompt(null);
    });
    return () => window.removeEventListener('beforeinstallprompt', h);
  }, []);
  return React.createElement(PwaCtx.Provider, {
    value: {
      prompt,
      installed
    }
  }, children);
}
const usePwa = () => useContext(PwaCtx);

function useInfiniteScroll(items, pageSize) {
  pageSize = pageSize || 10;
  const [page, setPage] = useState(1);
  const loaderRef = useRef(null);
  const displayed = items.slice(0, page * pageSize);
  const hasMore = items.length > page * pageSize;
  useEffect(() => setPage(1), [items.length]);
  useEffect(() => {
    const el = loaderRef.current;
    if (!el || !hasMore) return;
    const obs = new IntersectionObserver(en => {
      if (en[0].isIntersecting) setPage(p => p + 1);
    }, {
      threshold: 0.1
    });
    obs.observe(el);
    return () => obs.disconnect();
  }, [hasMore]);
  return {
    displayed,
    hasMore,
    loaderRef
  };
}
function LoadMore({
  hasMore,
  loaderRef
}) {
  if (!hasMore) return null;
  return React.createElement('div', {
    ref: loaderRef,
    style: {
      display: 'flex',
      justifyContent: 'center',
      padding: '20px 0'
    }
  }, React.createElement('div', {
    className: 'spinner'
  }));
}
